<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D STP 視覺化測試 - 終極相容版</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- 使用 UMD 傳統模式 (萬用相容) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.12/dist/occt-import-js.js"></script>
</head>
<body>
    <div id="ui-overlay">
        <div class="glass-container">
            <h1>3D STP 視覺化測試</h1>
            
            <div id="status-container">
                <p id="status-text">正在準備場景...</p>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fg"></div>
                </div>
            </div>

            <!-- 偵錯資訊區域 -->
            <div id="debug-area">
                <strong>診斷資訊：</strong>
                <div id="error-log"></div>
            </div>

            <div class="controls-info">
                <h3>互動說明：</h3>
                <ul>
                    <li>🖱️ 左鍵旋轉：觀察模型結構</li>
                    <li>🖱️ 右鍵平移：移動視角</li>
                    <li>🖱️ 滾輪縮放：查看細節</li>
                </ul>
            </div>
            
            <div class="model-details">
                <ul class="model-info">
                    <li id="model-name">模型名稱：等待載入...</li>
                    <li>解析引擎：occt-import-js (WASM)</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 3D 渲染區域 -->
    <div id="container"></div>

    <!-- PMI 側欄 -->
    <div id="pmi-sidebar">
        <h2 style="margin-top:0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 1.5rem;">📏</span> 語義公差 (PMI)
        </h2>
        
        <div class="mode-controls">
            <button class="mode-btn active" id="mode-cad" onclick="setVisionMode('cad')">工程灰</button>
            <button class="mode-btn" id="mode-hlr" onclick="setVisionMode('hlr')">技術線稿</button>
            <button class="mode-btn" id="mode-wire" onclick="setVisionMode('wire')">線架構</button>
        </div>

        <div id="pmi-list">
            <div style="text-align: center; color: #999; padding: 40px 0;">
                載入模型以分析公差數據...
            </div>
        </div>
    </div>

    <div class="ui-panel">
        <button onclick="document.getElementById('file-input').click()">📂 開啟本地模型</button>
        <button onclick="window.resetCamera()">🔄 重設視角</button>
        <button onclick="window.toggleGrid()">切換格線</button>
        <input type="file" id="file-input" accept=".stp,.step" title="選擇 STP 檔案">
    </div>

    <!-- 改回一般 script -->
    <script src="app.js"></script>
</body>
</html>
