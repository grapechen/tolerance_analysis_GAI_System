<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 視覺化特徵選取測試</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
        .pmi-card { border-left: 3px solid #4CAF50; padding-left: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="info">
        <h3>3D 特徵選取選器原型</h3>
        <p>滑鼠右鍵旋轉，滾輪縮放。</p>
        <p>點擊模型表面選取特徵。</p>
        <div id="status">當前選取: 無</div>
    </div>

    <!-- 載入 Three.js (CDN 版) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 建立場景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        
        // 燈光
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        // 點擊事件處理
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                const faceId = object.name || "未知 ID";
                document.getElementById('status').innerText = "當前選取: " + faceId;
                
                // 發光效果雛型 (視覺反饋)
                object.material.emissive = new THREE.Color(0x333333);
                setTimeout(() => { object.material.emissive = new THREE.Color(0x000000); }, 500);
            }
        });

        // 模擬載入 GLTF 模型 (待 Converter 實作後替換路徑)
        // const loader = new GLTFLoader();
        // loader.load('./test_data/part.glb', (gltf) => { scene.add(gltf.scene); });

        // 渲染循環
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
